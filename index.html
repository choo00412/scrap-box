<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>choo 보관함</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f5f8fa; }
    h1 { color: #1da1f2; font-size: 24px; font-weight: 800; }
    
    .controls { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    button { padding: 8px 12px; border: none; border-radius: 20px; background-color: #e1e8ed; cursor: pointer; font-size: 13px; font-weight: bold; color: #14171a; transition: 0.2s; }
    button:hover { background-color: #cbd6e2; }
    button.active { background-color: #1da1f2; color: white; }
    
    .filter-select { padding: 8px 12px; border-radius: 20px; border: 1px solid #cbd6e2; background-color: white; font-size: 13px; font-weight: bold; color: #14171a; cursor: pointer; outline: none; }
    
    .link-card { background: white; border: 1px solid #e1e8ed; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    
    .category-select { background-color: #1da1f2; color: white; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; border: none; outline: none; cursor: pointer; }
    .date { font-size: 12px; color: #657786; }
    
    /* 출처 플랫폼 뱃지 스타일 */
    .platform-badge { display: inline-block; padding: 3px 6px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; margin-right: 5px; vertical-align: middle; }
    
    .title { font-size: 16px; font-weight: bold; margin: 0 0 10px 0; line-height: 1.4; word-break: keep-all; }
    .title a { color: #14171a; text-decoration: none; vertical-align: middle; }
    .title a:hover { color: #1da1f2; text-decoration: underline; }
    
    .memo-box { background-color: #f8f9fa; border: 1px dashed #cbd6e2; padding: 10px; border-radius: 8px; font-size: 13px; color: #555; margin-bottom: 10px; cursor: pointer; transition: 0.2s; line-height: 1.4; }
    .memo-box:hover { background-color: #e1e8ed; }
    .memo-box.has-content { border-style: solid; background-color: #e8f4fd; color: #14171a; }
    
    .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid #e1e8ed; padding-top: 10px; }
    .like-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0; color: #e0245e; }
    .delete-btn { background: none; border: none; font-size: 13px; cursor: pointer; padding: 0; color: #657786; }
  </style>
</head>
<body>

  <h1>📥 choo 보관함</h1>
  
  <div class="controls">
    <button id="btn-new" class="active" onclick="setSort('new')">최신순</button>
    <button id="btn-old" onclick="setSort('old')">오래된순</button>
    <button id="btn-like" onclick="toggleLikedFilter()">❤️ 좋아요만</button>
    
    <select id="category-filter" class="filter-select" onchange="setCategoryFilter(this.value)">
      <option value="all">📁 전체 분류 보기</option>
      <option value="재희">재희</option>
      <option value="혜윤">혜윤</option>
      <option value="벨">벨</option>
      <option value="웃김">웃김</option>
      <option value="정보">정보</option>
      <option value="미분류">미분류</option>
    </select>
  </div>

  <div id="link-list"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    let links = JSON.parse(localStorage.getItem('nitter_links')) || [];
    let currentSort = 'new';
    let showOnlyLiked = false;
    let currentCategoryFilter = 'all';

    const CATEGORIES = ['미분류', '재희', '혜윤', '벨', '웃김', '정보'];

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const sharedUrl = urlParams.get('url');
      const sharedText = urlParams.get('text');
      const sharedTitleParam = urlParams.get('title');

      let finalUrl = sharedUrl || '';
      if (!finalUrl && sharedText && sharedText.includes('http')) {
        const urlMatch = sharedText.match(/https?:\/\/[^\s]+/);
        if (urlMatch) finalUrl = urlMatch[0];
      }

      let rawText = sharedText || sharedTitleParam || '';
      let finalTitle = rawText.replace(/https?:\/\/[^\s]+/g, '').trim();
      if (finalTitle === '') {
        finalTitle = '새로운 게시물';
      }

      if (finalUrl && finalUrl.startsWith('http')) {
        saveLink(finalTitle, finalUrl);
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      
      renderLinks();
    });

    function saveLink(title, url) {
      if (!links.some(link => link.url === url)) {
        links.unshift({ 
          id: Date.now(), 
          title: title, 
          url: url, 
          date: new Date().toLocaleString('ko-KR'),
          liked: false,
          category: '미분류',
          memo: ''
        });
        saveToStorage();
      }
    }

    function saveToStorage() {
      localStorage.setItem('nitter_links', JSON.stringify(links));
    }

    // ⭐️ URL을 분석해서 플랫폼 정보(이름, 색상)를 찾아주는 마법의 함수
    function getPlatformInfo(url) {
      const lowerUrl = url.toLowerCase();
      if (lowerUrl.includes('nitter') || lowerUrl.includes('twitter.com') || lowerUrl.includes('x.com')) return { name: '🐦 Nitter', color: '#1da1f2' };
      if (lowerUrl.includes('instagram.com')) return { name: '📸 인스타', color: '#E1306C' };
      if (lowerUrl.includes('theqoo.net')) return { name: '🦆 더쿠', color: '#333333' };
      if (lowerUrl.includes('fmkorea.com')) return { name: '⚽ 펨코', color: '#144288' };
      if (lowerUrl.includes('youtube.com') || lowerUrl.includes('youtu.be')) return { name: '▶️ 유튜브', color: '#FF0000' };
      return { name: '🌐 웹사이트', color: '#888888' }; // 모르는 사이트일 경우
    }

    function renderLinks() {
      const listDiv = document.getElementById('link-list');
      
      let displayLinks = showOnlyLiked ? links.filter(link => link.liked) : [...links];

      if (currentCategoryFilter !== 'all') {
        displayLinks = displayLinks.filter(link => link.category === currentCategoryFilter);
      }

      if (currentSort === 'old') {
        displayLinks.sort((a, b) => a.id - b.id);
      } else {
        displayLinks.sort((a, b) => b.id - a.id);
      }
      
      if(displayLinks.length === 0) {
        listDiv.innerHTML = "<p style='color:#657786; text-align:center; padding: 30px 0;'>조건에 맞는 링크가 없습니다.</p>";
        return;
      }

      listDiv.innerHTML = displayLinks.map(link => {
        const categoryOptions = CATEGORIES.map(cat => 
          `<option value="${cat}" ${link.category === cat ? 'selected' : ''}>${cat}</option>`
        ).join('');

        // ⭐️ 저장된 URL을 바탕으로 출처 뱃지 만들기
        const platform = getPlatformInfo(link.url);

        return `
          <div class="link-card">
            <div class="card-header">
              <select class="category-select" onchange="changeCategory(${link.id}, this.value)">
                ${categoryOptions}
              </select>
              <span class="date">${link.date}</span>
            </div>
            
            <h3 class="title">
              <span class="platform-badge" style="background-color: ${platform.color};">${platform.name}</span>
              <a href="${link.url}" target="_blank">${link.title}</a>
            </h3>
            
            <div class="memo-box ${link.memo ? 'has-content' : ''}" onclick="editMemo(${link.id})">
              ${link.memo ? link.memo : '✍️ 캡션을 추가하려면 클릭하세요 (예: 1분 30초 레전드)'}
            </div>
            
            <div class="card-actions">
              <button class="like-btn" onclick="toggleLike(${link.id})">
                ${link.liked ? '❤️' : '🤍'}
              </button>
              <button class="delete-btn" onclick="deleteLink(${link.id})">삭제</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function changeCategory(id, newCategory) {
      const index = links.findIndex(l => l.id === id);
      if (index !== -1) {
        links[index].category = newCategory;
        saveToStorage();
        if(currentCategoryFilter !== 'all') renderLinks(); 
      }
    }

    function editMemo(id) {
      const index = links.findIndex(l => l.id === id);
      if (index !== -1) {
        const currentMemo = links[index].memo || '';
        const newMemo = prompt("캡션을 입력하세요:", currentMemo);
        
        if (newMemo !== null) {
          links[index].memo = newMemo.trim();
          saveToStorage();
          renderLinks();
        }
      }
    }

    function toggleLike(id) {
      const index = links.findIndex(l => l.id === id);
      if (index !== -1) {
        links[index].liked = !links[index].liked;
        saveToStorage();
        renderLinks();
      }
    }

    function deleteLink(id) {
      if(confirm("이 링크를 삭제하시겠습니까?")) {
        links = links.filter(l => l.id !== id);
        saveToStorage();
        renderLinks();
      }
    }

    function setSort(type) {
      currentSort = type;
      document.getElementById('btn-new').classList.toggle('active', type === 'new');
      document.getElementById('btn-old').classList.toggle('active', type === 'old');
      renderLinks();
    }

    function toggleLikedFilter() {
      showOnlyLiked = !showOnlyLiked;
      document.getElementById('btn-like').classList.toggle('active', showOnlyLiked);
      renderLinks();
    }

    function setCategoryFilter(category) {
      currentCategoryFilter = category;
      renderLinks();
    }
  </script>
</body>
</html>
