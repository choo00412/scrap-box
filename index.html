<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitter 보관함</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f5f8fa; }
    h1 { color: #1da1f2; font-size: 24px; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    button { padding: 8px 12px; border: none; border-radius: 20px; background-color: #e1e8ed; cursor: pointer; font-size: 14px; font-weight: bold; color: #14171a; transition: 0.2s; }
    button:hover { background-color: #cbd6e2; }
    button.active { background-color: #1da1f2; color: white; }
    
    .link-card { background: white; border: 1px solid #e1e8ed; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .category-tag { background-color: #1da1f2; color: white; padding: 4px 8px; border-radius: 12px; font-size: 12px; cursor: pointer; font-weight: bold; }
    .date { font-size: 12px; color: #657786; }
    .title { font-size: 16px; font-weight: bold; margin: 0 0 10px 0; line-height: 1.4; }
    .title a { color: #14171a; text-decoration: none; }
    .title a:hover { color: #1da1f2; text-decoration: underline; }
    .card-actions { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #e1e8ed; padding-top: 10px; }
    .like-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0; color: #e0245e; }
    .delete-btn { background: none; border: none; font-size: 14px; cursor: pointer; padding: 0; color: #657786; }
  </style>
</head>
<body>

  <h1>📥 나의 Nitter 보관함</h1>
  
  <div class="controls">
    <button id="btn-new" class="active" onclick="setSort('new')">최신순</button>
    <button id="btn-old" onclick="setSort('old')">오래된순</button>
    <button id="btn-like" onclick="toggleLikedFilter()">❤️ 좋아요만</button>
  </div>

  <div id="link-list"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    let links = JSON.parse(localStorage.getItem('nitter_links')) || [];
    let currentSort = 'new';
    let showOnlyLiked = false;

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const sharedUrl = urlParams.get('url') || urlParams.get('text');
      const sharedTitle = urlParams.get('title') || '제목 없음';

      if (sharedUrl && sharedUrl.startsWith('http')) {
        saveLink(sharedTitle, sharedUrl);
        window.history.replaceState({}, document.title, "/");
      }
      renderLinks();
    });

    // 링크 저장 (새로운 속성들 추가)
    function saveLink(title, url) {
      if (!links.some(link => link.url === url)) {
        links.unshift({ 
          id: Date.now(), 
          title: title, 
          url: url, 
          date: new Date().toLocaleString('ko-KR'),
          liked: false,
          category: '미분류' // 기본 카테고리
        });
        saveToStorage();
      }
    }

    function saveToStorage() {
      localStorage.setItem('nitter_links', JSON.stringify(links));
    }

    // 화면 그리기 로직
    function renderLinks() {
      const listDiv = document.getElementById('link-list');
      
      // 필터링 (좋아요 누른 것만 보기)
      let displayLinks = showOnlyLiked ? links.filter(link => link.liked) : [...links];

      // 정렬 (최신순 / 오래된순)
      if (currentSort === 'old') {
        displayLinks.sort((a, b) => a.id - b.id);
      } else {
        displayLinks.sort((a, b) => b.id - a.id);
      }
      
      if(displayLinks.length === 0) {
        listDiv.innerHTML = "<p style='color:#657786;'>표시할 링크가 없습니다.</p>";
        return;
      }

      listDiv.innerHTML = displayLinks.map(link => `
        <div class="link-card">
          <div class="card-header">
            <span class="category-tag" onclick="editCategory(${link.id})">${link.category} ✏️</span>
            <span class="date">${link.date}</span>
          </div>
          <h3 class="title"><a href="${link.url}" target="_blank">${link.title !== '제목 없음' ? link.title : '새로운 Nitter 게시물 보기'}</a></h3>
          <div class="card-actions">
            <button class="like-btn" onclick="toggleLike(${link.id})">
              ${link.liked ? '❤️' : '🤍'}
            </button>
            <button class="delete-btn" onclick="deleteLink(${link.id})">삭제</button>
          </div>
        </div>
      `).join('');
    }

    // 좋아요 토글 기능
    function toggleLike(id) {
      const index = links.findIndex(l => l.id === id);
      if (index !== -1) {
        links[index].liked = !links[index].liked;
        saveToStorage();
        renderLinks();
      }
    }

    // 카테고리 수정 기능 (아이돌, 웃김, 혜윤 등 직접 입력)
    function editCategory(id) {
      const index = links.findIndex(l => l.id === id);
      if (index !== -1) {
        const newCat = prompt("카테고리를 입력하세요 (예: 아이돌, 웃김, 혜윤):", links[index].category);
        if (newCat && newCat.trim() !== "") {
          links[index].category = newCat.trim();
          saveToStorage();
          renderLinks();
        }
      }
    }

    // 링크 삭제
    function deleteLink(id) {
      if(confirm("이 링크를 삭제하시겠습니까?")) {
        links = links.filter(l => l.id !== id);
        saveToStorage();
        renderLinks();
      }
    }

    // 정렬 버튼 동작
    function setSort(type) {
      currentSort = type;
      document.getElementById('btn-new').classList.toggle('active', type === 'new');
      document.getElementById('btn-old').classList.toggle('active', type === 'old');
      renderLinks();
    }

    // 좋아요 필터 버튼 동작
    function toggleLikedFilter() {
      showOnlyLiked = !showOnlyLiked;
      document.getElementById('btn-like').classList.toggle('active', showOnlyLiked);
      renderLinks();
    }
  </script>
</body>
</html>
